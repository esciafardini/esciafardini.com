<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- Syntax-highlighting theme (Tokyo Night — pairs with the Kanagawa palette) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  </head>
  <body>

    <aside class="sidebar">
      <h1>@esciafardini</h1>
      <p class="subtitle">slow down</p>
      <nav>
        <a href="#blog">Posts</a>
        <a href="#about">About</a>
      </nav>
    </aside>

    <main class="main">

      <!-- =========================================== -->
      <!--  BLOG                                        -->
      <!-- =========================================== -->

      <div class="tag-bar" id="tag-bar"></div>

      <!-- List view: tag filters + post list (both populated by the script below) -->
      <div id="blog-list">
        <ul class="side-bar" id="side-bar"></ul>
      </div>

      <!-- Single-post view (hidden until a post is opened) -->
      <article id="blog-post" style="display:none;">
        <div class="post-body" id="post-body"></div>
      </article>

      <article id="about" style="display:none;">
        <div class="about-body" id="about-body"></div>
      </article>

    </main>

    <!-- For security purposes... -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js"></script>
    <!-- Markdown parser + syntax highlighter, loaded from CDNs so they aren't code we maintain -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- highlight.js's common bundle omits Clojure, so register it explicitly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/clojure.min.js"></script>
    <!-- The blog engine itself. Must load after marked/highlight.js above, which it depends on. -->
    <script src="blog.js"></script>

  </body>
</html>
